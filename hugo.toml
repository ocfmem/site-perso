baseURL = '/'
languageCode = 'fr-fr'
defaultContentLanguage = 'fr'
defaultContentLanguageInSubdir = false
title = 'Meddy MENZIKOFF - C.T.O.'
theme = 'terminal'
copyright = '© 2026 Meddy Menzikoff'
enableRobotsTXT = true
summaryLength = 45

[sitemap]
  changefreq = 'weekly'
  priority = 0.5
  filename = 'sitemap.xml'

pagination.pagerSize = 6

[markup.highlight]
  noClasses = false

[markup.goldmark.renderer]
  unsafe = true

[params]
  contentTypeName = 'posts'
  showMenuItems = 7
  showLanguageSelector = true
  fullWidthTheme = false
  centerTheme = true
  autoCover = true
  readingTime = true
  Toc = true
  TocTitle = 'Sommaire'
  showLastUpdated = true
  updatedDatePrefix = 'Mise à jour :'
  dateFormat = '2006-01-02'

[languages]
  [languages.fr]
    languageName = 'Français'
    title = 'Meddy MENZIKOFF - C.T.O.'

    [languages.fr.params]
      subtitle = 'Bio, articles, projets, services, CV, conférences et contact'
      keywords = 'cloud, aws, serverless, ia, devops, saas'
      menuMore = 'Voir plus'
      readMore = 'Lire la suite'
      readOtherPosts = 'Autres articles'
      newerPosts = 'Articles récents'
      olderPosts = 'Articles plus anciens'
      missingContentMessage = 'Page introuvable...'
      missingBackButtonLabel = 'Retour à l’accueil'
      minuteReadingTime = 'min de lecture'
      words = 'mots'

      [languages.fr.params.seo]
        personName = 'Meddy Menzikoff'
        personTitle = 'CTO Hands-on / Architecte & DevOps Cloud AWS'
        personImage = '/img/meddy-menzikoff-bio.webp'
        sameAs = [
          'https://www.linkedin.com/in/meddy-menzikoff/',
          'https://github.com/ocfmem',
          'https://www.doyoubuzz.com/meddy-menzikoff',
          'https://www.oneclickflare.fr/'
        ]

      [languages.fr.params.logo]
        logoText = 'Meddy MENZIKOFF - C.T.O.'
        logoHomeLink = '/'

    [languages.fr.menu]
      [[languages.fr.menu.main]]
